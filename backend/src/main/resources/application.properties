# ============================================
# Smart Civic Complaint Management System
# Application Configuration
# ============================================

# Application Name
spring.application.name=smart-civic-complaint-system

# ============================================
# Server Configuration
# ============================================
server.port=8080

# ============================================
# Azure MySQL Database Configuration
# ============================================

spring.datasource.url=jdbc:mysql://civicmysql2026.mysql.database.azure.com:3306/civic_complaints?useSSL=true&requireSSL=false&serverTimezone=UTC

spring.datasource.username=civicadmin@civicmysql2026

spring.datasource.password=Civic@2026Secure

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.hikari.initialization-fail-timeout=0
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.maximum-pool-size=5

# ============================================
# JPA / Hibernate Configuration
# ============================================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ============================================
# Thymeleaf Configuration
# ============================================

spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ============================================
# File Upload Configuration
# ============================================

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.enabled=true

# Local upload fallback
app.upload.dir=uploads/complaints

# ============================================
# Session Configuration
# ============================================

server.servlet.session.timeout=30m

# ============================================
# Error Handling
# ============================================

server.error.include-message=always
server.error.include-binding-errors=always

# ============================================
# Logging Configuration
# ============================================

logging.level.com.civic=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=INFO

# ============================================
# Azure Blob Storage Configuration
# ============================================

azure.storage.connection-string=${AZURE_STORAGE_CONNECTION_STRING:UseDevelopmentStorage=true}

azure.storage.container-name=complaint-images

# ============================================
# Gemini AI Configuration
# ============================================

gemini.api.key=YOUR_API_KEY_HERE
