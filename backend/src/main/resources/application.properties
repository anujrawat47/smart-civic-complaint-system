# ============================================
# Smart Civic Complaint Management System
# Application Configuration
# ============================================

# Application Name
spring.application.name=smart-civic-complaint-system

# Server Port
server.port=8080

# ============================================
# H2 Database Configuration (In-Memory for Instant Run)
# ============================================
spring.datasource.url=jdbc:h2:mem:civic_complaints_db;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.sql.init.mode=never

# ============================================
# MySQL Database Configuration (Uncomment to use MySQL)
# ============================================
# spring.datasource.url=jdbc:mysql://localhost:3306/civic_complaints_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
# spring.datasource.username=root
# spring.datasource.password=your_password_here
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================
# JPA/Hibernate Configuration
# ============================================
# update: Updates schema on startup
spring.jpa.hibernate.ddl-auto=update
# Show SQL queries in console (helpful for debugging)
spring.jpa.show-sql=true
# Format SQL for readability
spring.jpa.properties.hibernate.format_sql=true
# Hibernate dialect (H2 handles this, MySQL when uncommented)
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ============================================
# Thymeleaf Configuration
# ============================================
# Disable caching during development for hot reload
spring.thymeleaf.cache=false
# Template location
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ============================================
# File Upload Configuration
# ============================================
# Maximum file size (10MB)
spring.servlet.multipart.max-file-size=10MB
# Maximum request size
spring.servlet.multipart.max-request-size=10MB
# Enable multipart uploads
spring.servlet.multipart.enabled=true

# Custom property for upload directory
app.upload.dir=uploads/complaints

# ============================================
# Session Configuration
# ============================================
# Session timeout (30 minutes)
server.servlet.session.timeout=30m

# ============================================
# Error Handling
# ============================================
# Include error messages in response
server.error.include-message=always
server.error.include-binding-errors=always

# ============================================
# Logging Configuration
# ============================================
# Log level for application
logging.level.com.civic=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# ============================================
# Azure Deployment Configuration (Optional)
# ============================================
# Uncomment these for Azure App Service deployment
# spring.datasource.url=${AZURE_MYSQL_URL}
# spring.datasource.username=${AZURE_MYSQL_USERNAME}
# spring.datasource.password=${AZURE_MYSQL_PASSWORD}

azure.storage.connection-string=${AZURE_STORAGE_CONNECTION_STRING}
azure.storage.container-name=complaint-images

# ============================================
# Gemini AI Configuration
# ============================================
gemini.api.key=YOUR_API_KEY_HERE
